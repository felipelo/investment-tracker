databaseChangeLog:
  - changeSet:
      id: 005-create-price-snapshot
      author: investment-tracker
      changes:
        - createTable:
            tableName: price_snapshot
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_price_snapshot
              - column:
                  name: security_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_price_snapshot_security
                    references: security(id)
              - column:
                  name: snapshot_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: NUMERIC(18,4)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: price_snapshot
            columnNames: security_id, snapshot_date
            constraintName: uq_price_snapshot_security_date
        - sql:
            sql: >
              ALTER TABLE price_snapshot
              ADD CONSTRAINT chk_price_snapshot_price
              CHECK (price >= 0);
        - createIndex:
            indexName: idx_price_snapshot_security_date
            tableName: price_snapshot
            columns:
              - column:
                  name: security_id
              - column:
                  name: snapshot_date
