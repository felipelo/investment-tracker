databaseChangeLog:
  - changeSet:
      id: 003-create-security-transaction
      author: investment-tracker
      changes:
        - createTable:
            tableName: security_transaction
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_security_transaction
              - column:
                  name: txn_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: security_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_sectxn_security
                    references: security(id)
              - column:
                  name: account_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_sectxn_account
                    references: account(id)
              - column:
                  name: action
                  type: VARCHAR(24)
                  constraints:
                    nullable: false
              - column:
                  name: shares
                  type: NUMERIC(18,6)
              - column:
                  name: price_per_share
                  type: NUMERIC(18,4)
              - column:
                  name: commission
                  type: NUMERIC(18,4)
              - column:
                  name: cash_amount
                  type: NUMERIC(18,4)
              - column:
                  name: split_ratio
                  type: NUMERIC(18,6)
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - sql:
            sql: >
              ALTER TABLE security_transaction
              ADD CONSTRAINT chk_sectxn_action
              CHECK (action IN ('BUY','SELL','RETURN_OF_CAPITAL','REINVESTED_DISTRIBUTION','SPLIT'));
        - sql:
            sql: >
              ALTER TABLE security_transaction
              ADD CONSTRAINT chk_buy_sell
              CHECK (
                action NOT IN ('BUY','SELL')
                OR (shares > 0 AND price_per_share >= 0)
              );
        - sql:
            sql: >
              ALTER TABLE security_transaction
              ADD CONSTRAINT chk_distribution
              CHECK (
                action NOT IN ('RETURN_OF_CAPITAL','REINVESTED_DISTRIBUTION')
                OR (cash_amount IS NOT NULL AND shares IS NULL AND price_per_share IS NULL)
              );
        - sql:
            sql: >
              ALTER TABLE security_transaction
              ADD CONSTRAINT chk_split
              CHECK (action <> 'SPLIT' OR split_ratio > 0);
        - createIndex:
            indexName: idx_sectxn_security_date
            tableName: security_transaction
            columns:
              - column:
                  name: security_id
              - column:
                  name: txn_date
