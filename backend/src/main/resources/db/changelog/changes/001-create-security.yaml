databaseChangeLog:
  - changeSet:
      id: 001-create-security
      author: investment-tracker
      changes:
        - createTable:
            tableName: security
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_security
              - column:
                  name: ticker
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_security_ticker
              - column:
                  name: name
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
              - column:
                  name: asset_class
                  type: VARCHAR(16)
              - column:
                  name: currency
                  type: CHAR(3)
                  defaultValue: CAD
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
