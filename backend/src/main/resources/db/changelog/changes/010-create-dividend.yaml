databaseChangeLog:
  - changeSet:
      id: 010-create-dividend
      author: investment-tracker
      changes:
        - createTable:
            tableName: dividend
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_dividend
              - column:
                  name: portfolio_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_dividend_portfolio
                    references: portfolio(id)
              - column:
                  name: security_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_dividend_security
                    references: security(id)
              - column:
                  name: payment_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: gross_amount
                  type: NUMERIC(18,4)
                  constraints:
                    nullable: false
              - column:
                  name: withholding_tax
                  type: NUMERIC(18,4)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: CHAR(3)
                  defaultValue: CAD
                  constraints:
                    nullable: false
              - column:
                  name: drip
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - sql:
            sql: >
              ALTER TABLE dividend
              ADD CONSTRAINT chk_dividend_amounts
              CHECK (gross_amount >= 0 AND withholding_tax >= 0 AND withholding_tax <= gross_amount);
        - createIndex:
            indexName: idx_dividend_portfolio_date
            tableName: dividend
            columns:
              - column:
                  name: portfolio_id
              - column:
                  name: payment_date
