databaseChangeLog:
  - changeSet:
      id: 002-create-account
      author: investment-tracker
      changes:
        - createTable:
            tableName: account
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_account
              - column:
                  name: label
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(24)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: CHAR(3)
                  defaultValue: CAD
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
