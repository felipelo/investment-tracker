databaseChangeLog:
  - changeSet:
      id: 012-create-cash-transaction
      author: investment-tracker
      changes:
        - createTable:
            tableName: cash_transaction
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_cash_transaction
              - column:
                  name: account_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cash_transaction_account
                    references: account(id)
              - column:
                  name: counterparty_account_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    foreignKeyName: fk_cash_transaction_counterparty
                    references: account(id)
              - column:
                  name: type
                  type: VARCHAR(24)
                  constraints:
                    nullable: false
              - column:
                  name: tx_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: NUMERIC(18,4)
                  constraints:
                    nullable: false
              - column:
                  name: purpose
                  type: VARCHAR(16)
              - column:
                  name: transfer_group_id
                  type: VARCHAR(36)
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_cash_transaction_account_date
            tableName: cash_transaction
            columns:
              - column:
                  name: account_id
              - column:
                  name: tx_date
        - createIndex:
            indexName: idx_cash_transaction_transfer_group
            tableName: cash_transaction
            columns:
              - column:
                  name: transfer_group_id
